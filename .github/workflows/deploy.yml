name: Deploy CAP to SAP BTP


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install
        

      - name: Install CDS & MBT
        run: |
          npm install -g @sap/cds-dk
          npm install -g mbt

      - name: Build CAP Project
        run: cds build

      - name: Build MTA
        run: mbt build

      # 👉 THIS IS WHERE YOUR CODE STARTS
      - name: Install CF CLI
        run: |
              sudo apt-get update
              sudo apt-get install -y curl
              curl -fsSL https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo tee /usr/share/keyrings/cf-cli-keyring.gpg > /dev/null
              echo "deb [signed-by=/usr/share/keyrings/cf-cli-keyring.gpg] https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
              sudo apt-get update
              sudo apt-get install -y cf8-cli

      - name: Verify CF CLI
        run: cf --version

      - name: Install CF MultiApps Plugin
        run: |
          cf install-plugin -f multiapps

      - name: Login to SAP BTP
        run: |
          cf login -a ${{ secrets.CF_API }} \
                   -u ${{ secrets.CF_USERNAME }} \
                   -p ${{ secrets.CF_PASSWORD }} \
                   -o ${{ secrets.CF_ORG }} \
                   -s ${{ secrets.CF_SPACE }}

      - name: Deploy to BTP
        run: |
          cf deploy mta_archives/*.mtar